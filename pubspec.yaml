name: swis_school
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2
dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.0
  carousel_slider: ^5.0.0
  cupertino_icons: ^1.0.2
  dio: ^5.4.0
  dropdown_button2: ^3.0.0
  easy_image_viewer: ^1.3.2
  flutter_dotenv: ^6.0.0
  flutter_switch: ^0.3.2
  get: ^4.6.6
  http_parser: ^4.0.2
  image_picker: ^1.0.5
  intl: ^0.20.2
  logging: ^1.2.0
  mask_text_input_formatter: ^2.7.0
  mobile_scanner: ^7.0.0
  package_info_plus: ^9.0.1
  pull_to_refresh: ^2.0.0
  shared_preferences: ^2.2.2
  timeline_tile: ^2.0.0
  upgrader: ^12.5.0
  url_launcher: ^6.2.2
  internet_connection_checker_plus: ^2.7.2
  shimmer: ^3.0.0
  photo_view: ^0.15.0
  convex_bottom_bar: ^3.2.0
  
dependency_overrides:
  vm_service: 14.0.0
  test_api: 0.7.0
  web: ^0.4.0
dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  get_cli: ^1.9.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/icon/
    - .env
    
  fonts:
    - family: Battambang
      fonts:
        - asset: assets/fonts/Battambang-Regular.ttf
          weight: 400
  
